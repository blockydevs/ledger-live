name: "Upload Allure Report"
description: "Uploading allure report to Allure Server"
inputs:
  login:
    required: true
    description: "Allure Server Login"
  password:
    required: true
    description: "Allure Server Password"
  platform:
    required: true
    description: "Tested Platform"
  path:
    required: true
    description: "Report Path"
  report_path_suffix:
    required: false
    description: "Suffix for allure report path (defaults to platform)"
  summary_message:
    required: false
    description: "Formatted Allure test summary written to GitHub Step Summary before the report link"
outputs:
  report-url:
    description: "Allure report URL"
    value: ${{ steps.generate-report.outputs.url }}

runs:
  using: composite

  steps:
    - id: branch-name
      uses: tj-actions/branch-names@v6
    - name: Set report path
      id: report-path
      shell: bash
      run: |
        REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
        BRANCH="${{ steps.branch-name.outputs.current_branch }}"
        SUFFIX="${{ inputs.report_path_suffix || inputs.platform }}"
        if [ "${{ github.repository }}" != "LedgerHQ/ledger-live" ]; then
          PATH_VALUE="${REPO_NAME}-${BRANCH}-${SUFFIX}"
        else
          PATH_VALUE="${BRANCH}-${SUFFIX}"
        fi
        echo "path=${PATH_VALUE}" >> "$GITHUB_OUTPUT"
    - name: Compress PNG files
      shell: bash
      run: ${{ github.action_path }}/compress-pngs.sh "${{ inputs.path }}"
    - name: Build Allure upload dir
      id: prepare
      shell: bash
      run: ${{ github.action_path }}/build-allure-upload-dir.sh "${{ inputs.path }}" "${{ runner.temp }}/allure-upload"
    - name: Upload allure results
      id: upload-results
      uses: LedgerHQ/actions/allure/upload@815ffa9c111f5f0947ff73c9b12067d787bf34e0 # main @ 2026-06-25
      with:
        url: "https://ledger-live.allure.green.ledgerlabs.net"
        username: ${{ inputs.login }}
        password: ${{ inputs.password }}
        results: ${{ steps.prepare.outputs.path }}
    - name: Generate allure report
      id: generate-report
      uses: LedgerHQ/actions/allure/generate@815ffa9c111f5f0947ff73c9b12067d787bf34e0 # main @ 2026-06-25
      with:
        url: "https://ledger-live.allure.green.ledgerlabs.net"
        username: ${{ inputs.login }}
        password: ${{ inputs.password }}
        path: ${{ steps.report-path.outputs.path }}
        results: ${{ steps.upload-results.outputs.uuid }}
        build-name: ${{ github.workflow }}-${{ inputs.platform }}
        build-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    - name: Write Allure report in summary
      shell: bash
      env:
        REPORT_URL: ${{ steps.generate-report.outputs.url }}
        SUMMARY_MESSAGE: ${{ inputs.summary_message }}
      run: |
        if [ -n "$SUMMARY_MESSAGE" ]; then
          echo "$SUMMARY_MESSAGE" >> "$GITHUB_STEP_SUMMARY"
        fi
        echo "[Open report](${REPORT_URL})" >> "$GITHUB_STEP_SUMMARY"
