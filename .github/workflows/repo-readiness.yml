name: "[Koda] - Repo Readiness - Manual"

on:
  workflow_dispatch:
    inputs:
      level:
        description: "Check level: 'infra' (sandbox + clone + lifecycle commands) or 'full' (infra + coding-agent task)"
        required: false
        default: "infra"
        type: choice
        options:
          - infra
          - full

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  repo-readiness:
    name: "Repo Readiness"
    runs-on: ubuntu-latest
    steps:
      - name: Check repo readiness
        uses: LedgerHQ/cairn@main
        with:
          workflow: repo-readiness
          url: ${{ vars.CAIRN_URL }}
          token: ${{ secrets.CAIRN_TOKEN }}
          wait: "true"
          timeout: "3600"
          input: |-
            repoUrl: https://github.com/${{ github.repository }}
            ref: ${{ github.ref_name }}
            level: ${{ inputs.level }}
