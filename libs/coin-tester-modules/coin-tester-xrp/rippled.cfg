# Minimal rippled config for standalone integration testing.
# Boots a single-node network with a fresh genesis ledger.
# Admin JSON-RPC on :5005, admin WebSocket on :6006.
# https://xrpl.org/docs/infrastructure/configuration/configure-grpc

[server]
port_rpc_admin_local
port_ws_admin_local

[port_rpc_admin_local]
port = 5005
ip = 0.0.0.0
admin = 0.0.0.0
protocol = http

[port_ws_admin_local]
port = 6006
ip = 0.0.0.0
admin = 0.0.0.0
protocol = ws

[node_size]
tiny

[node_db]
type = NuDB
path = /var/lib/rippled/db/nudb
online_delete = 256
advisory_delete = 0

[database_path]
/var/lib/rippled/db

[ledger_history]
full

[fetch_depth]
full

[rpc_startup]
{ "command": "log_level", "severity": "warning" }
